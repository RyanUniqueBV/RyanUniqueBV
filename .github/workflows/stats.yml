name: Generate GitHub Stats

on:
  schedule:
    - cron: "23 4 * * *" # Daily at 04:23 UTC
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate stats SVG
        # GH_TOKEN must be a classic PAT with scopes: read:user, read:org, repo
        # github.token fallback only sees public data on this repo and will miss
        # organization + private contributions.
        run: node scripts/generate-stats.mjs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git diff --staged --quiet || git commit -m "Update GitHub stats"
          git push
